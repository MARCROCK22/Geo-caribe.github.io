TYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map-wrap { position: relative; width: 100%; height: 100vh; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    #btn-inicio {
      position: absolute; top: 12px; right: 12px; z-index: 1000;
      padding: 7px 14px; background: white;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 13px; cursor: pointer;
    }
    #btn-inicio:hover { background: #f0f0f0; }
    #side-panel {
      position: absolute; top: 0; left: -340px; width: 320px; height: 100%;
      background: white; z-index: 999;
      border-right: 1px solid #ddd;
      transition: left 0.3s ease; display: flex; flex-direction: column; overflow: hidden;
    }
    #side-panel.open { left: 0; }
    #panel-img { width: 100%; height: 160px; object-fit: cover; flex-shrink: 0; }
    #panel-img-placeholder {
      width: 100%; height: 160px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; background: #f5f5f5;
    }
    #panel-body { padding: 16px; overflow-y: auto; flex: 1; }
    #panel-title { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
    #panel-subtitle { font-size: 13px; color: #666; margin: 0 0 12px; }
    #panel-desc { font-size: 14px; line-height: 1.6; margin: 0 0 12px; }
    #panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .ptag {
      font-size: 12px; padding: 3px 10px; border-radius: 20px;
      background: #e3f2fd; color: #1565c0;
    }
    #panel-close {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      background: rgba(0,0,0,0.35); border: none; border-radius: 50%;
      width: 28px; height: 28px; cursor: pointer; color: white;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .tucan-tooltip {
      background: white !important; border: 1px solid #ccc !important;
      border-radius: 6px !important; font-size: 13px !important;
      font-weight: 500 !important; padding: 5px 10px !important;
      box-shadow: none !important; white-space: nowrap;
    }
    .tucan-tooltip::before { display: none !important; }
  </style>
</head>
<body>
<div id="map-wrap">
  <div id="map"></div>
  <button id="btn-inicio" onclick="volverAlInicio()">Volver al inicio</button>
  <div id="side-panel">
    <button id="panel-close" onclick="cerrarPanel()">✕</button>
    <div id="panel-img-placeholder">🦜</div>
    <img id="panel-img" src="" alt="" style="display:none"/>
    <div id="panel-body">
      <p id="panel-title"></p>
      <p id="panel-subtitle"></p>
      <p id="panel-desc"></p>
      <div id="panel-tags"></div>
    </div>
  </div>
</div>

<script>

  /* ============================================================
   *  ÍCONO DEL MARCADOR — editá esta sección para cambiarlo
   * ============================================================
   *
   *  OPCIÓN A: SVG inline (el tucán actual)
   *  Podés modificar el SVG directamente o reemplazarlo con
   *  cualquier otro SVG que quieras usar como ícono.
   * ------------------------------------------------------------ */
  const tucanSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="38" height="38">
    <ellipse cx="24" cy="30" rx="11" ry="13" fill="#1a1a1a"/>
    <ellipse cx="24" cy="22" rx="9" ry="9" fill="#1a1a1a"/>
    <ellipse cx="24" cy="20" rx="7" ry="6" fill="#f5f5f0"/>
    <ellipse cx="28" cy="14" rx="10" ry="5" fill="#f0a500" transform="rotate(-15 28 14)"/>
    <ellipse cx="28" cy="14" rx="9" ry="3.5" fill="#e63b2e" transform="rotate(-15 28 14)"/>
    <circle cx="21" cy="19" r="2" fill="#1a1a1a"/>
    <circle cx="21" cy="18.5" r="0.8" fill="white"/>
    <ellipse cx="24" cy="38" rx="6" ry="4" fill="#e63b2e"/>
  </svg>`;

  const tucanIcon = L.icon({
  iconUrl: './GeoCaribeProyecto/tucan_icon.png',  // ← ruta a tu imagen
  iconSize: [48, 48],
  iconAnchor: [24, 48],
  popupAnchor: [0, -50]
});
  /*
   *  OPCIÓN B: imagen externa (PNG/JPG)
   *  Comentá todo lo de arriba y descomentá esto:
   *
   *  const tucanIcon = L.icon({
   *    iconUrl: 'https://tu-sitio.com/icono.png',
   *    iconSize: [38, 38],
   *    iconAnchor: [19, 38],
   *    tooltipAnchor: [20, -19]
   *  });
   *
   * ============================================================ */


  /* ---- Datos de los lugares ---- */
  const lugares = [
    {
      latlng: [9.99074, -83.03596],
      nombre: "Limón Centro",
      subtitulo: "Puerto Caribe de Costa Rica",
      desc: "Puerto Limón es la capital de la provincia de Limón y el principal puerto marítimo de Costa Rica en el Caribe. Es el centro de la cultura afrocostarricense, con festividades como el Carnaval de Limón en octubre.",
      tags: ["Puerto", "Cultura afrocaribe", "Carnaval"],

      img: "https://costarica.org/wp-content/uploads/2017/09/Limon2.jpg"   // <-- URL de imagen para el panel, o dejá vacío para usar el emoji
    },
    {
      latlng: [9.7319895, -82.8211192],
      nombre: "Playa Cahuita",
      subtitulo: "Cahuita, Limón",
      desc: "Una de las playas más hermosas del Caribe costarricense, ubicada junto al Parque Nacional Cahuita. Sus aguas cálidas y el arrecife de coral la convierten en un destino ideal para el snorkel.",
      tags: ["Playa", "Snorkel", "Parque Nacional"],

      img: "https://descubramoscostarica.com/sites/default/files/styles/wide/public/2021-12/cahuita-1.jpg.webp?itok=ghhC7i06"
    },
    {
      latlng: [9.643367832448668, -82.68753794816715],
      nombre: "Punta Uva",
      subtitulo: "Puerto Viejo de Talamanca, Limón",
      desc: "Punta Uva es considerada una de las playas más bonitas de Costa Rica. Rodeada de selva tropical, sus aguas son cristalinas de color turquesa. Ideal para nadar, bucear y disfrutar del Caribe sur.",
      tags: ["Playa virgen", "Turquesa", "Selva"],
      img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQC1BIMzYFSf2hNvB8ISK2sinM_aHMcgzW35Q&s"
    }
  ];

  /* ---- Mapa ---- */
  const map = L.map('map').setView([9.99074, -83.03596], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  lugares.forEach(lugar => {
    const marker = L.marker(lugar.latlng, { icon: tucanIcon }).addTo(map);
    marker.bindTooltip(`<span>${lugar.nombre}</span>`, {
      direction: 'right', className: 'tucan-tooltip',
      offset: [10, -19], permanent: false, sticky: false
    });
    marker.on('click', () => abrirPanel(lugar));
  });

  /* ---- Panel lateral ---- */
  function abrirPanel(lugar) {
    document.getElementById('panel-title').textContent = lugar.nombre;
    document.getElementById('panel-subtitle').textContent = lugar.subtitulo;
    document.getElementById('panel-desc').textContent = lugar.desc;

    const tags = document.getElementById('panel-tags');
    tags.innerHTML = lugar.tags.map(t => `<span class="ptag">${t}</span>`).join('');

    const img = document.getElementById('panel-img');
    const placeholder = document.getElementById('panel-img-placeholder');
    if (lugar.img) {
      img.src = lugar.img; img.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      img.style.display = 'none';
      placeholder.style.display = 'flex';
      placeholder.textContent = lugar.emoji;
    }
    document.getElementById('side-panel').classList.add('open');
  }

  function cerrarPanel() {
    document.getElementById('side-panel').classList.remove('open');
  }

  function volverAlInicio() {
    map.setView([9.99074, -83.03596], 11);
    cerrarPanel();
  }
</script>
</body>
</html>
